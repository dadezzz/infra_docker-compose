networks:
  alloy_default:
    external: true
  traefik_default:
    external: true

services:
  rustfs:
    cap_drop:
      - ALL
    environment:
      RUSTFS_VOLUMES: /data/sda,/data/sdb,/data/sdc,/data/sdd
    image: docker.io/rustfs/rustfs:1.0.0-alpha.82@sha256:eadee1b524ec05cbc1fe08426a95e589bc70e70cd15a4591edf176cabde238a6
    labels:
      traefik.enable: true
      traefik.http.routers.rustfs-console.entrypoints: http,https
      traefik.http.routers.rustfs-console.rule: Host(`s3.zarantonello.dev`) && PathPrefix(`/rustfs`)
      traefik.http.routers.rustfs-console.service: rustfs-console
      traefik.http.routers.rustfs.entrypoints: http,https
      traefik.http.routers.rustfs.rule: Host(`s3.zarantonello.dev`)
      traefik.http.routers.rustfs.service: rustfs
      traefik.http.services.rustfs-console.loadbalancer.server.port: 9001
      traefik.http.services.rustfs.loadbalancer.server.port: 9000
    networks:
      - traefik_default
      - alloy_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 30847:30847
    volumes:
      - $HOME/volumes/rustfs:/data
      - $HOME/volumes/rustfs-logs:/logs
