services:
  minecraft:
    cap_drop:
      - ALL
    command:
      - java
      - -jar
      - fabric.jar
    image: docker.io/library/eclipse-temurin:26-jre@sha256:a671af2462fd83a3048b92726e2e7af1518762e531e3427302c02406d6f2f3ab
    labels:
      monitoring.logs: true
    ports:
      - 100.88.193.108:25565:25565
      - "[fd7a:115c:a1e0::6301:c1ac]:25565:25565"
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=36505,gid=36505
    user: 36505:36505
    volumes:
      - $HOME/volumes/minecraft:/data
    working_dir: /data
