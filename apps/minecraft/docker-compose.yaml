services:
  minecraft:
    cap_drop:
      - ALL
    command:
      - java
      - -jar
      - fabric.jar
    image: docker.io/library/eclipse-temurin:25-jre@sha256:43a7b50abf8679d77d6d41d52072402a18312a47b4390864046b393e2570137b
    labels:
      monitoring.logs: true
    ports:
      - 25565:25565
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=36505,gid=36505
    user: 36505:36505
    volumes:
      - $HOME/volumes/minecraft:/data
    working_dir: /data
