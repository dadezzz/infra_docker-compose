networks:
  traefik_default:
    external: true

services:
  transmission:
    cap_drop:
      - ALL
    image: git.zarantonello.dev/infra/transmission:v1.3.0@sha256:cf5f92e85f67c19ea60e9bfb4e60827841fc06a0f898844f51fc85f07fa15dba
    labels:
      traefik.enable: true
      traefik.http.routers.transmission.entrypoints: https
      traefik.http.routers.transmission.rule: Host(`torrents.zarantonello.net`)
      traefik.http.services.transmission.loadbalancer.server.port: 9091
    networks:
      - traefik_default
    ports:
      - 51413:51413/tcp
      - 51413:51413/udp
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=27732,gid=27732
    user: 27732:27732
    volumes:
      - $HOME/volumes/transmission/config:/.config/transmission-daemon
      - $HOME/volumes/transmission/data:/data
