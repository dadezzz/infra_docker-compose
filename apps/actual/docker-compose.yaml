networks:
  traefik_default:
    external: true

services:
  actual:
    cap_drop:
      - ALL
    image: docker.io/actualbudget/actual-server:latest@sha256:eb8bc26f53025e07e464594c12d77c52c4b95840c8dadd9b95c4f0c4660f8ad2
    labels:
      traefik.enable: true
      traefik.http.routers.actual.entrypoints: https
      traefik.http.routers.actual.rule: Host(`actual.zarantonello.net`)
      traefik.http.services.actual.loadbalancer.server.port: 5006
    networks:
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 14638:14638
    volumes:
      - $HOME/volumes/actual:/data
