networks:
  traefik_default:
    external: true

services:
  actual:
    cap_drop:
      - ALL
    image: docker.io/actualbudget/actual-server:latest@sha256:b733ae30c70a66dc4d03577526e53575a0c04eab4f3ab6ace30934776251058c
    labels:
      traefik.enable: true
      traefik.http.routers.actual.entrypoints: https
      traefik.http.routers.actual.rule: Host(`actual.zarantonello.net`)
      traefik.http.services.actual.loadbalancer.server.port: 5006
    networks:
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 14638:14638
    volumes:
      - $HOME/volumes/actual:/data
