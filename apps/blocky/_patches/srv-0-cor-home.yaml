include:
  - ../docker-compose.base.yaml

name: blocky

services:
  blocky:
    ports:
      - "[fd7a:115c:a1e0::a601:c192]:53:53/tcp"
      - "[fd7a:115c:a1e0::a601:c192]:53:53/udp"
      - 100.98.193.109:53:53/tcp
      - 100.98.193.109:53:53/udp
      # docker containers use localhost. Disable systemd-resolved on systems
      # where it is running.
      - 127.0.0.1:53:53/udp
      - 127.0.0.1:53:53/tcp
      - 192.168.1.2:53:53/udp
      - 192.168.1.2:53:53/tcp
