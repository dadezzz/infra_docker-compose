services:
  llama:
    command: |
      -b 1024 -ub 256 --no-warmup
      --models-preset /models/config.ini --models-max 1
    devices:
      - /dev/dri
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:c125168c7b0ca8b9b904b36d20d2dc74c7c9c11f85bcecb052a86d35b31e16b5
    ports:
      - 127.0.0.1:8080:8080
    read_only: true
    restart: always
    user: 1000:1000
    volumes:
      - $HOME/.local/share/llama-server/models:/models
      - $HOME/.cache/llama-server:/home/ubuntu/.cache
