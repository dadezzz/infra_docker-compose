services:
  llama:
    command: |
      -b 1024 -ub 256
      --flash-attn on
      --no-warmup
      --models-max 1
      --models-preset /models/config.ini
    devices:
      - /dev/dri
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:2cc5bdbb6ecfba9b75e14ec72657c385e9c8bd760fc2f7aec16e6c920d7efc84
    ports:
      - 127.0.0.1:8080:8080
    read_only: true
    restart: always
    user: 1000:1000
    volumes:
      - $HOME/.local/share/llama-server/models:/models
      - $HOME/.cache/llama-server:/home/ubuntu/.cache
