services:
  llama:
    command: |
      -b 1024 -ub 256 --no-warmup
      --models-preset /models/config.ini --models-max 1
    devices:
      - /dev/dri
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:dae5edf01ba6a224d2710078365fb9f34a14c3a519c8830188e9b7a886c01ad3
    ports:
      - 127.0.0.1:8080:8080
    read_only: true
    restart: always
    user: 1000:1000
    volumes:
      - $HOME/.local/share/llama-server/models:/models
      - $HOME/.cache/llama-server:/home/ubuntu/.cache
