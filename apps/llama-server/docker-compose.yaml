services:
  llama:
    command: |
      -b 1024 -ub 256 --no-warmup
      --models-preset /models/config.ini --models-max 1
    devices:
      - /dev/dri
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:6224860460bc1d8cfc94ed0ddefb6b8f5db4d050b21853988c149a89e8a6de11
    ports:
      - 127.0.0.1:8080:8080
    read_only: true
    restart: always
    user: 1000:1000
    volumes:
      - $HOME/.local/share/llama-server/models:/models
      - $HOME/.cache/llama-server:/home/ubuntu/.cache
