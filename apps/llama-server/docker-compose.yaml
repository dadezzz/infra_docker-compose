services:
  llama:
    command: |
      -b 1024 -ub 256 --no-warmup
      --models-preset /models/config.ini --models-max 1
    devices:
      - /dev/dri
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:6ce972e5e62376cefb5eb347e1198d9cb87996d555c9b97f58a6d37b84f71e97
    ports:
      - 127.0.0.1:8080:8080
    read_only: true
    restart: always
    user: 1000:1000
    volumes:
      - $HOME/.local/share/llama-server/models:/models
      - $HOME/.cache/llama-server:/home/ubuntu/.cache
