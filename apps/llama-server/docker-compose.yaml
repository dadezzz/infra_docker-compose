services:
  llama:
    command: |
      -b 1024 -ub 256
      --flash-attn on
      --no-warmup
      --models-max 1
      --models-preset /models/config.ini
    devices:
      - /dev/dri
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:e4870dc306315f060fdd0476e060921255df4e0c20be081e80997678e4adf7d9
    ports:
      - 127.0.0.1:8080:8080
    read_only: true
    restart: always
    user: 1000:1000
    volumes:
      - $HOME/.local/share/llama-server/models:/models
      - $HOME/.cache/llama-server:/home/ubuntu/.cache
