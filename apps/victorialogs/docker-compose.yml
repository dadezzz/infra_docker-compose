networks:
  alloy_default:
    external: true
  traefik_default:
    external: true

services:
  victorialogs:
    cap_drop:
      - ALL
    command:
      - -retentionPeriod=30d
    image: docker.io/victoriametrics/victoria-logs:v1.47.0@sha256:70cadcf591e593456decccb23250765a4a5f2cd62904e2ab181fd4db45428d5e
    labels:
      monitoring.metrics.port: 9428
      traefik.enable: true
      traefik.http.routers.victorialogs.entrypoints: http
      traefik.http.routers.victorialogs.rule: Host(`victorialogs.zarantonello.net`)
      traefik.http.services.victorialogs.loadbalancer.server.port: 9428
    networks:
      - traefik_default
      - alloy_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 54433:54433
    volumes:
      - $HOME/volumes/victorialogs:/victoria-logs-data
