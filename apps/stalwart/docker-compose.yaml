configs:
  stalwart:
    file: _configs/config.json

networks:
  alloy_default:
    external: true
  stalwart_default:
    enable_ipv6: true
    name: stalwart_default
  traefik_default:
    external: true

services:
  stalwart:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    configs:
      - source: stalwart
        target: /etc/stalwart/config.json
    healthcheck:
      disable: true
    image: docker.io/stalwartlabs/stalwart:v0.16.2-alpine@sha256:c4b454956fc8b9d008eb1716225519e644a0e21173fd6e6068a44179d22e9d8d
    labels:
      monitoring.logs: true
      monitoring.metrics.path: /metrics/prometheus
      monitoring.metrics.port: 80
      traefik.enable: true
      traefik.http.routers.stalwart-public.entrypoints: cloudflare
      traefik.http.routers.stalwart-public.rule: (Host(`mta-sts.zarantonello.dev`) || Host(`mta-sts.zarantonello.net`)) && Path(`/.well-known/mta-sts.txt`)
      traefik.http.routers.stalwart-public.service: stalwart-public
      traefik.http.routers.stalwart.entrypoints: https
      traefik.http.routers.stalwart.rule: Host(`mail.zarantonello.dev`)
      traefik.http.routers.stalwart.service: stalwart
      traefik.http.services.stalwart-public.loadbalancer.server.port: 80
      traefik.http.services.stalwart.loadbalancer.server.port: 80
    networks:
      - alloy_default
      - stalwart_default
      - traefik_default
    ports:
      - 25:25
      - 465:465
      - 993:993
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=54815,gid=54815
    user: 54815:54815
    volumes:
      - $HOME/volumes/stalwart:/var/lib/stalwart
