configs:
  stalwart:
    file: _configs/stalwart.toml
  caddy:
    file: _configs/Caddyfile

networks:
  alloy_default:
    external: true
  traefik_default:
    external: true

services:
  stalwart:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    configs:
      - source: stalwart
        target: /opt/stalwart/etc/config.toml
    image: docker.io/stalwartlabs/stalwart:v0.15.3-alpine@sha256:da618c6d20326f78b6ea619e9f98a722c4d710f89360fbc5beaba8829cad5064
    ports:
      - 25:25
      - 465:465
      - 993:993
    labels:
      monitoring.collect: true
      monitoring.metrics.port: 80
      monitoring.metrics.path: /metrics/prometheus
      traefik.enable: true
      traefik.http.routers.stalwart-public.entrypoints: cloudflared
      traefik.http.routers.stalwart-public.rule: (Host(`mta-sts.zarantonello.dev`) || Host(`mta-sts.zarantonello.net`)) && Path(`/.well-known/mta-sts.txt`)
      traefik.http.routers.stalwart-public.service: stalwart-public
      traefik.http.routers.stalwart.entrypoints: https
      traefik.http.routers.stalwart.rule: Host(`mail.zarantonello.dev`)
      traefik.http.routers.stalwart.service: stalwart
      traefik.http.services.stalwart-public.loadbalancer.server.port: 80
      traefik.http.services.stalwart.loadbalancer.server.port: 80
    networks:
      - alloy_default
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=54815,gid=54815
    user: 54815:54815
    volumes:
      - $HOME/volumes/stalwart:/opt/stalwart
      - stalwart-caddy-data:/opt/caddy:ro

  # This only acts as an automatic certificate provider for stalwart.
  # Since stalwart's acme requires the config file to be writable :(.
  caddy:
    build: .
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    env_file: .env
    configs:
      - source: caddy
        target: /etc/caddy/Caddyfile
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /config:uid=54815,gid=54815
    user: 54815:54815
    volumes:
      - stalwart-caddy-data:/data

volumes:
  stalwart-caddy-data: {}
