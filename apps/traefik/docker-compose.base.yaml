configs:
  traefik:
    file: ./_configs/traefik.yml

networks:
  alloy_default:
    external: true
  traefik_default:
    name: traefik_default

services:
  traefik:
    cap_drop:
      - ALL
    configs:
      - source: traefik
        target: /etc/traefik/traefik.yml
    env_file: .env
    group_add:
      - 991
    image: docker.io/library/traefik:v3.6.15@sha256:8cb20d16e01a53d8d7f7696ac2f1af7d200d5c9984d226ce2299731d9eab6d6c
    labels:
      monitoring.metrics.port: 8082
    networks:
      - alloy_default
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 51664:51664
    volumes:
      - traefik-certificates:/var/lib/traefik
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  traefik-certificates: {}
