configs:
  traefik:
    file: ./_configs/traefik.yml

networks:
  alloy_default:
    external: true
  traefik_default:
    name: traefik_default

services:
  traefik:
    cap_drop:
      - ALL
    configs:
      - source: traefik
        target: /etc/traefik/traefik.yml
    env_file: .env
    group_add:
      - 991
    image: docker.io/library/traefik:v3.6.14@sha256:1c1be62608b6a484c585a917203b01a8226cff13df6a2a78705eeb66b52e667e
    labels:
      monitoring.metrics.port: 8082
    networks:
      - alloy_default
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 51664:51664
    volumes:
      - traefik-certificates:/var/lib/traefik
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  traefik-certificates: {}
